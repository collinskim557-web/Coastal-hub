<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard - Pwani</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-xl font-bold text-blue-600">My Dashboard</h1>
  <div>
    <a href="index.html" class="mr-4">Home</a>
    <button onclick="logout()" class="text-red-500">Logout</button>
  </div>
</header>

<section class="max-w-6xl mx-auto p-6">
  <h2 class="text-2xl font-bold mb-4">My Listings</h2>
  <div id="myListings" class="grid md:grid-cols-3 gap-6"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBKcnd952c81LyG0ofN_un-BCMdb0FzQ4w",
  authDomain: "coastal-marketing-38cae.firebaseapp.com",
  projectId: "coastal-marketing-38cae",
  storageBucket: "coastal-marketing-38cae.firebasestorage.app",
  messagingSenderId: "539485085349",
  appId: "1:539485085349:web:bca60232ce7fe3617b374c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  loadMyListings(user.uid);
});

function loadMyListings(uid){
  const container = document.getElementById("myListings");
  container.innerHTML = "Loading...";

  db.collection("listings")
    .where("userId", "==", uid)
    .get()
    .then(snapshot => {

      if (snapshot.empty) {
        container.innerHTML = `
          <div class="text-center col-span-3 text-gray-500">
            <h2 class="text-xl font-bold">No listings yet</h2>
            <p>Start by posting your first stay or car 🚀</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        container.innerHTML += `
          <div class="bg-white p-4 rounded-xl shadow hover:shadow-lg transition">

            <img src="${item.image || ''}" class="h-40 w-full object-cover rounded mb-2">

            <h3 class="font-bold text-lg">${item.title || 'No title'}</h3>
            <p class="text-gray-600">KSh ${item.price || 0}</p>
            <p class="text-sm text-gray-500">${item.location || 'Unknown'}</p>

            <div class="flex gap-2 mt-3">

              <button onclick="editListing('${doc.id}')"
                class="bg-blue-500 text-white px-3 py-1 rounded w-full">
                Edit
              </button>

              <button onclick="deleteListing('${doc.id}')"
                class="bg-red-500 text-white px-3 py-1 rounded w-full">
                Delete
              </button>

            </div>
          </div>
        `;
      });

    })
    .catch(err => {
      console.error(err);
      document.getElementById("myListings").innerHTML = "Error loading listings";
    });
}

function deleteListing(id){
  if(confirm("Delete this listing?")){
    db.collection("listings").doc(id).delete()
      .then(() => {
        alert("Deleted successfully");
        location.reload();
      });
  }
}

function editListing(id, currentData) {
  const newTitle = prompt("Edit title", currentData.title);
  const newPrice = prompt("Edit price", currentData.price);
  const newLocation = prompt("Edit location", currentData.location);

  if (!newTitle || !newPrice || !newLocation) return;

  db.collection("listings").doc(id).update({
    title: newTitle,
    price: newPrice,
    location: newLocation
  }).then(() => {
    alert("Updated successfully 🚀");
    location.reload();
  });
}

function logout(){
  auth.signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
