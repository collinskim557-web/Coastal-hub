<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal Marketplace</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {display:flex;justify-content:space-between;padding:15px;background:#020617;}
button,input,select {padding:10px;border:none;border-radius:8px;margin:5px;}
button {background:#22c55e;color:white;cursor:pointer;}

.hero {
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  padding:80px;text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;padding:20px;
}

.card {
  height:240px;border-radius:15px;
  display:flex;align-items:flex-end;
  background-size:cover;background-position:center;
}

.overlay {
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:10px;
}

.booked {background:red;padding:5px;border-radius:5px;}
.hidden {display:none;}

/* 🔥 MESSAGE BOX */
#msg {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:8px;
  display:none;
  font-weight:bold;
}

.success {background:#22c55e;}
.error {background:#ef4444;}
</style>
</head>

<body>

<div id="msg"></div>

<header>
  <h2>Coastal Marketplace</h2>
  <div>
    <button onclick="toggleAuth()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="hero">
  <h1>Find Cars & Stays</h1>
  <input id="search" placeholder="Search..." oninput="filterListings()">

  <select id="filterLocation" onchange="filterListings()">
    <option value="">All Locations</option>
    <option>Mombasa</option>
    <option>Diani</option>
    <option>Kilifi</option>
    <option>Kwale</option>
  </select>
</div>

<h2 style="padding-left:20px;">Popular Stays</h2>
<div id="stays" class="grid"></div>

<h2 style="padding-left:20px;">Cars</h2>
<div id="cars" class="grid"></div>

<div id="dashboard" class="hidden">
  <h2 style="padding-left:20px;">My Dashboard</h2>

  <div style="padding:20px;">
    <input id="title" placeholder="Title">
    <input id="image" placeholder="Image URL">

    <select id="location">
      <option>Mombasa</option>
      <option>Diani</option>
      <option>Kilifi</option>
      <option>Kwale</option>
    </select>

    <select id="type">
      <option value="stay">Stay</option>
      <option value="car">Car</option>
    </select>

    <input id="price" placeholder="Price">
    <button onclick="addListing()">Add</button>
  </div>

  <div id="myListings" class="grid"></div>
</div>

<div id="authBox" class="hidden" style="padding:20px;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBKcnd952c81LyG0ofN_un-BCMdb0FzQ4w",
  authDomain: "coastal-marketing-38cae.firebaseapp.com",
  databaseURL: "https://coastal-marketing-38cae-default-rtdb.firebaseio.com",
  projectId: "coastal-marketing-38cae",
  storageBucket: "coastal-marketing-38cae.firebasestorage.app",
  messagingSenderId: "539485085349",
  appId: "1:539485085349:web:5452b5ef6f31a7357b374c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function showMsg(text,type){
  msg.innerText=text;
  msg.className=type;
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",3000);
}

/* AUTH */
function toggleAuth(){ authBox.classList.toggle("hidden"); }

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>{
    showMsg("Account created successfully","success");
  })
  .catch(e=>{
    showMsg(e.message,"error");
  });
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>{
    showMsg("Login successful","success");
  })
  .catch(e=>{
    showMsg(e.message,"error");
  });
}

function logout(){
  auth.signOut();
  showMsg("Logged out","success");
}

/* KEEP REST SAME */
</script>

</body>
</html>
