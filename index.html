<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coastal Booking</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

header {
  display:flex; justify-content:space-between;
  padding:15px; background:#020617;
}

button,input,select {
  padding:10px; margin:5px;
  border:none; border-radius:8px;
}

button { background:#22c55e; color:white; cursor:pointer; }

.hero {
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  padding:80px; text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px; padding:20px;
}

.card {
  height:260px;
  border-radius:15px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  background-size:cover;
}

.overlay {
  background:rgba(0,0,0,0.7);
  padding:10px;
}

.hidden { display:none; }

#msg {
  position:fixed;
  top:10px; right:10px;
  padding:10px;
  border-radius:8px;
  display:none;
}
.success { background:green; }
.error { background:red; }

.calendar {
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header>
<h2>Coastal Booking</h2>
<div>
<button onclick="toggleAuth()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<div id="msg"></div>

<div class="hero">
<h1>Book Cars & Stays</h1>
<input id="search" placeholder="Search..." oninput="filterListings()">
</div>

<h2 style="padding-left:20px;">Listings</h2>
<div id="listings" class="grid"></div>

<!-- AUTH -->
<div id="authBox" class="hidden">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h2 style="padding-left:20px;">My Dashboard</h2>

<input id="title" placeholder="Title">
<input id="image" placeholder="Image URL">
<input id="price" placeholder="Price">

<select id="location">
<option>Mombasa</option>
<option>Diani</option>
<option>Kilifi</option>
<option>Kwale</option>
</select>

<select id="type">
<option value="stay">Stay</option>
<option value="car">Car</option>
</select>

<button onclick="addListing()">Add Listing</button>

<div id="myListings" class="grid"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBKcnd952c81LyG0ofN_un-BCMdb0FzQ4w",
  authDomain: "coastal-marketing-38cae.firebaseapp.com",
  databaseURL: "https://coastal-marketing-38cae-default-rtdb.firebaseio.com",
  projectId: "coastal-marketing-38cae",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* UI */
const authBox = document.getElementById("authBox");
const dashboard = document.getElementById("dashboard");
const myListings = document.getElementById("myListings");

function msg(t,type){
  const m=document.getElementById("msg");
  m.innerText=t;
  m.className=type;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",3000);
}

/* AUTH */
function toggleAuth(){ authBox.classList.toggle("hidden"); }

function signup(){
  auth.createUserWithEmailAndPassword(
    email.value,password.value
  ).then(()=>msg("Account created","success"))
  .catch(e=>msg(e.message,"error"));
}

function login(){
  auth.signInWithEmailAndPassword(
    email.value,password.value
  ).then(()=>msg("Logged in","success"))
  .catch(e=>msg(e.message,"error"));
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    dashboard.classList.remove("hidden");
    loadMyListings(user.uid);
  } else {
    dashboard.classList.add("hidden");
  }
});

/* ADD LISTING */
function addListing(){
  const user=auth.currentUser;
  if(!user) return msg("Login first","error");

  db.ref("listings/"+user.uid).push({
    title:title.value,
    image:image.value,
    price:price.value,
    location:location.value,
    type:type.value
  });
}

/* LOAD */
let allListings=[];

db.ref("listings").on("value",snap=>{
  allListings=[];
  snap.forEach(u=>{
    u.forEach(i=>{
      let d=i.val();
      d.id=i.key;
      d.uid=u.key;
      allListings.push(d);
    });
  });
  render(allListings);
});

function render(data){
  listings.innerHTML="";
  data.forEach(d=>{
    const img=d.image || (d.type==="car"
      ? "https://images.unsplash.com/photo-1503376780353-7e6692767b70"
      : "https://images.unsplash.com/photo-1566073771259-6a8506099945");

    listings.innerHTML+=`
    <div class="card" style="background:url('${img}')">
      <div class="overlay">
        <h3>${d.title}</h3>
        <p>${d.location} | $${d.price}</p>

        <!-- REAL CALENDAR -->
        <input type="date" id="in_${d.id}">
        <input type="date" id="out_${d.id}">

        <button onclick="book('${d.uid}','${d.id}')">Book</button>
      </div>
    </div>`;
  });
}

/* BOOKING */
function book(uid,id){
  const user=auth.currentUser;
  if(!user) return msg("Login first","error");

  const checkIn=document.getElementById("in_"+id).value;
  const checkOut=document.getElementById("out_"+id).value;

  if(!checkIn || !checkOut)
    return msg("Select dates","error");

  db.ref("bookings/"+id).push({
    user:user.uid,
    checkIn,
    checkOut
  });

  msg("Booked successfully","success");
}

/* SEARCH */
function filterListings(){
  const v=search.value.toLowerCase();
  render(allListings.filter(d=>d.title.toLowerCase().includes(v)));
}

/* MY LISTINGS */
function loadMyListings(uid){
  db.ref("listings/"+uid).on("value",snap=>{
    myListings.innerHTML="";
    snap.forEach(i=>{
      let d=i.val();
      myListings.innerHTML+=`
      <div class="card" style="background:url('${d.image}')">
        <div class="overlay">${d.title}</div>
      </div>`;
    });
  });
}
</script>

</body>
  </html>
