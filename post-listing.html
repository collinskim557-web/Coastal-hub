
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Listing - Pwani</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.fade-in{animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bg-card{background: linear-gradient(to bottom right, #e0f2fe, #fef9c3); border-radius: 1rem; padding: 1rem; margin-bottom:1rem;}
.amenity-badge{display:inline-block; background:#bfdbfe; color:#1e3a8a; px-2 py-1 rounded mr-2 mt-1; font-size:0.75rem;}
.card-preview{background-size: cover; background-position: center; border-radius:1rem; min-height:200px; position:relative; overflow:hidden; transition:all 0.3s ease;}
.card-overlay{position:absolute; inset:0; background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.2)); padding:1rem; color:white; display:flex; flex-direction:column; justify-content:flex-end; transition:all 0.3s ease;}
.card-preview:hover .card-overlay{background:rgba(0,0,0,0.7);}
.details-panel{max-height:0; overflow:hidden; transition:max-height 0.3s ease; margin-top:0.5rem;}
.card-preview:hover .details-panel{max-height:500px;}
.location-badge{display:flex; align-items:center; gap:0.25rem; font-size:0.75rem; background: rgba(0,0,0,0.6); padding:0.25rem 0.5rem; border-radius:0.5rem; margin-top:0.5rem;}
.location-badge img{width:16px; height:16px;}
</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-white text-gray-900">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-2xl font-bold text-blue-700">Pwani</h1>
    <nav class="flex gap-6 text-sm">
      <a href="index.html" class="transition hover:text-blue-800">Home</a>
      <a href="post-listing.html" class="font-semibold text-blue-600">Post Listing</a>
      <button onclick="logout()" class="text-red-500">Logout</button>
    </nav>
  </div>
</header>

<section class="max-w-3xl mx-auto p-6 fade-in">
  <h2 class="text-3xl font-bold mb-2">Post a Listing</h2>
  <p class="text-gray-600 mb-6">Reach thousands of travelers on Kenya's coast</p>

  <!-- Listing Type -->
  <div class="bg-card">
    <h3 class="font-semibold mb-2">What are you listing?</h3>
    <div class="flex gap-6">
      <label class="flex items-center gap-2"><input type="radio" name="type" value="stay"> Stay</label>
      <label class="flex items-center gap-2"><input type="radio" name="type" value="car"> Car</label>
    </div>
  </div>

  <!-- Basic Info -->
  <div class="bg-card">
    <h3 class="font-semibold mb-2">Basic Information</h3>
    <input id="title" placeholder="Listing Title" class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-blue-400">
    <textarea id="desc" placeholder="Description" class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-blue-400"></textarea>
    <select id="location" class="w-full p-3 border rounded mb-3">
      <option>Select Location</option>
      <option>Mombasa</option>
      <option>Nyali</option>
      <option>Bamburi</option>
      <option>Mtwapa</option>
      <option>Diani</option>
      <option>Watamu</option>
      <option>Malindi</option>
      <option>Kilifi</option>
      <option>Lamu</option>
      <option>Msambweni</option>
      <option>Vipingo</option>
      <option>Tiwi</option>
      <option>Voi</option>
    </select>
    <input id="price" placeholder="Price per Day (KES)" class="w-full p-3 border rounded mb-3">
    <input id="image" placeholder="Photo URL" class="w-full p-3 border rounded mb-3">
  </div>

  <!-- Dynamic Fields -->
  <div id="dynamicFields"></div>

  <!-- Amenities -->
  <div id="amenitiesSection" class="bg-card">
    <h3 class="font-semibold mb-2">Amenities</h3>
    <div id="amenitiesContainer" class="grid grid-cols-2 gap-2 mb-4"></div>
    <input id="customAmenity" placeholder="Add custom feature" class="w-full p-3 border rounded mb-3">
  </div>

  <!-- Contact -->
  <div class="bg-card">
    <h3 class="font-semibold mb-2">Your Contact Details</h3>
    <input id="name" placeholder="Full Name" class="w-full p-3 border rounded mb-3">
    <input id="phone" placeholder="Phone Number" class="w-full p-3 border rounded mb-3">
  </div>

  <button onclick="addListing()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition mb-6">Publish Listing</button>

  <!-- Live Preview -->
  <h3 class="text-xl font-bold mb-2">Live Preview</h3>
  <div id="previewCard" class="card-preview fade-in">
    <div class="card-overlay">
      <h3 class="font-bold text-lg">Title Preview</h3>
      <p id="previewPrice" class="text-blue-100 font-semibold">Price</p>
      <div class="location-badge">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/marker.png" alt="location icon">
        <span id="previewLocation">Location</span>
      </div>
      <div id="previewAmenities" class="flex flex-wrap gap-2 mt-2"></div>
      <div class="details-panel">
        <p id="previewDesc" class="mt-2 text-sm"></p>
        <p id="previewGuests" class="mt-1 text-sm"></p>
        <p id="previewBedrooms" class="mt-1 text-sm"></p>
        <p id="previewCarType" class="mt-1 text-sm"></p>
        <p id="previewSeats" class="mt-1 text-sm"></p>
        <p id="previewMileage" class="mt-1 text-sm"></p>
      </div>
    </div>
  </div>
</section>

<script>
let listings = JSON.parse(localStorage.getItem('pwani_listings')) || [];

const stayAmenities = ["WiFi","Swimming Pool","Air Conditioning","Ocean View","Private Beach Access","Breakfast Included","BBQ Area","Garden","Parking","Sea View","Kitchen","Washer","TV","Bicycle Rental","Snorkeling Gear"];
const carAmenities = ["GPS","AC","Sunroof","Child Seat","Unlimited Mileage","WiFi","Radio","Bluetooth","Heated Seats"];

function renderAmenities(type){
  const container = document.getElementById('amenitiesContainer');
  container.innerHTML = '';
  const list = type === 'stay' ? stayAmenities : carAmenities;
  list.forEach(a=>{
    const label = document.createElement('label');
    label.className = "flex items-center gap-2";
    label.innerHTML = `<input type="checkbox" class="amenity" value="${a}"> ${a}`;
    container.appendChild(label);
  });
}

function renderDynamicFields(type){
  const container = document.getElementById('dynamicFields');
  container.innerHTML = '';
  if(type === 'stay'){
    container.innerHTML = `
      <div class="bg-card">
        <h3 class="font-semibold mb-2">Stay Details</h3>
        <input id="guests" placeholder="Max Guests" class="w-full p-3 border rounded mb-3">
        <input id="bedrooms" placeholder="Bedrooms" class="w-full p-3 border rounded mb-3">
      </div>
    `;
  } else if(type === 'car'){
    container.innerHTML = `
      <div class="bg-card">
        <h3 class="font-semibold mb-2">Car Details</h3>
        <input id="carType" placeholder="Car Type (SUV, Sedan, Tuk Tuk, etc.)" class="w-full p-3 border rounded mb-3">
        <input id="seats" placeholder="Number of Seats" class="w-full p-3 border rounded mb-3">
        <input id="mileage" placeholder="Mileage per Day (KM)" class="w-full p-3 border rounded mb-3">
      </div>
    `;
  }
}

// Type change listener
document.querySelectorAll('input[name="type"]').forEach(r=>{
  r.addEventListener('change', e=>{
    const t = e.target.value;
    renderAmenities(t);
    renderDynamicFields(t);
    updatePreview(); 
  });
});

// Live Preview
function updatePreview(){
  const type = document.querySelector('input[name="type"]:checked')?.value || '';
  const titleText = document.getElementById('title').value || 'Title Preview';
  const priceText = document.getElementById('price').value ? 'KSh '+document.getElementById('price').value : 'Price';
  const locationText = document.getElementById('location').value || 'Location';
  const imageUrl = document.getElementById('image').value || 'https://via.placeholder.com/400';

  const previewCard = document.getElementById('previewCard');
  previewCard.style.backgroundImage = `url('${imageUrl}')`;
  previewCard.querySelector('h3').innerText = titleText;
  document.getElementById('previewPrice').innerText = priceText;
  document.getElementById('previewLocation').innerText = locationText;

  const previewAmenities = document.getElementById('previewAmenities');
  previewAmenities.innerHTML = '';
  document.querySelectorAll('.amenity:checked').forEach(a=>{
    const span = document.createElement('span');
    span.className = "amenity-badge";
    span.innerText = a.value;
    previewAmenities.appendChild(span);
  });
  if(document.getElementById('customAmenity').value){
    const span = document.createElement('span');
    span.className = "amenity-badge";
    span.innerText = document.getElementById('customAmenity').value;
    previewAmenities.appendChild(span);
  }

  // Details panel
  document.getElementById('previewDesc').innerText = document.getElementById('desc').value || '';
  document.getElementById('previewGuests').innerText = document.getElementById('guests')?.value ? 'Max Guests: '+document.getElementById('guests').value : '';
  document.getElementById('previewBedrooms').innerText = document.getElementById('bedrooms')?.value ? 'Bedrooms: '+document.getElementById('bedrooms').value : '';
  document.getElementById('previewCarType').innerText = document.getElementById('carType')?.value ? 'Car Type: '+document.getElementById('carType').value : '';
  document.getElementById('previewSeats').innerText = document.getElementById('seats')?.value ? 'Seats: '+document.getElementById('seats').value : '';
  document.getElementById('previewMileage').innerText = document.getElementById('mileage')?.value ? 'Mileage: '+document.getElementById('mileage').value+' km' : '';
}

// Input listeners
['title','price','location','image','desc','customAmenity'].forEach(id=>{
  document.getElementById(id).addEventListener('input', updatePreview);
});
document.getElementById('amenitiesContainer').addEventListener('change', updatePreview);
document.getElementById('dynamicFields').addEventListener('input', updatePreview);

// Save listing
function addListing(){
  const type = document.querySelector('input[name="type"]:checked')?.value;
  if(!type){
    alert('Select listing type');
    return;
  }

  const amenities = [];
  document.querySelectorAll('.amenity:checked').forEach(el=>{
    amenities.push(el.value);
  });

  const customAmenity = document.getElementById('customAmenity').value;
  if(customAmenity) amenities.push(customAmenity);

 const user = firebase.auth().currentUser;

if (!user) {
  alert("You must be logged in");
  return;
}

const listing = {
  userId: user.uid, // ✅ correct

  type: type,
  title: document.getElementById("title").value,
  desc: document.getElementById("desc").value,
  location: document.getElementById("location").value,
  price: document.getElementById("price").value,
  image: document.getElementById("image").value,
  guests: document.getElementById("guests")?.value || "",
  bedrooms: document.getElementById("bedrooms")?.value || "",
  carType: document.getElementById("carType")?.value || "",
  seats: document.getElementById("seats")?.value || "",
  mileage: document.getElementById("mileage")?.value || "",
  amenities: amenities,
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  createdAt: new Date()
};

  // 🔥 SAVE TO FIREBASE (THIS WAS MISSING)
  db.collection("listings").add(listing)
    .then(() => {
      alert("Listing Published 🚀");
      window.location.href = "index.html";
    })
    .catch(error => {
      console.error(error);
      alert("Error saving listing");
    });
}
updatePreview(); // initial render
</script>

</body>
</html>
